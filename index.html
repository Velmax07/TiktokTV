<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TV Online • IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:#fff;font-family:system-ui,sans-serif;padding:16px;padding-bottom:80px;}
.header{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.logo{font-size:24px;font-weight:bold;background:linear-gradient(135deg,#e63946,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.search{flex:1;padding:10px 16px;background:#1a1a24;border:1px solid #2a2a3a;border-radius:50px;color:#fff;font-size:14px;}
.search:focus{outline:none;border-color:#e63946;}
.player{background:#000;border-radius:12px;overflow:hidden;margin-bottom:20px;border:1px solid #2a2a3a;}
.player-header{background:#111;padding:12px 16px;display:flex;gap:12px;align-items:center;border-bottom:1px solid #2a2a3a;}
.live{background:#e63946;color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:bold;}
.ch-name{color:#ffd166;font-weight:bold;flex:1;}
.close-player{background:#333;border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;}
.video-container{width:100%;height:400px;background:#000;position:relative;}
video{width:100%;height:100%;object-fit:contain;}
.loader{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;}
.loader.show{display:block;}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#e63946;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none;}
.error-msg.show{display:block;}
.cat-scroll{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-pill{background:#1a1a24;border:1px solid #2a2a3a;padding:6px 14px;border-radius:50px;font-size:12px;cursor:pointer;white-space:nowrap;}
.cat-pill.active{background:#e63946;border-color:#e63946;}
.channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;margin-top:16px;}
.channel-card{background:#16161e;border:1px solid #2a2a3a;border-radius:10px;cursor:pointer;padding:10px;text-align:center;transition:0.2s;position:relative;}
.channel-card:hover{border-color:#e63946;transform:scale(1.02);}
.channel-card.active{border:2px solid #e63946;}
.channel-img{height:60px;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#8B0000,#B22222);border-radius:8px;margin-bottom:6px;}
.channel-img img{max-width:80%;max-height:50px;object-fit:contain;}
.channel-img span{font-size:28px;}
.ch-name-small{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fav-btn{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.6);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:#ffd166;z-index:1;}
.count-badge{background:#e63946;border-radius:50px;padding:2px 8px;font-size:11px;margin-left:8px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a24;border:1px solid #2a2a3a;padding:8px 16px;border-radius:50px;font-size:12px;z-index:1000;opacity:0;transition:0.3s;pointer-events:none;}
.toast.show{opacity:1;}
@media (max-width:600px){.video-container{height:250px;}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">📺 TV Online</div>
  <input type="text" class="search" id="searchInput" placeholder="Buscar canal...">
</div>

<div class="player" id="playerSection">
  <div class="player-header">
    <span class="live">🔴 AO VIVO</span>
    <span class="ch-name" id="currentChannelName">Selecione um canal</span>
    <button class="close-player" onclick="closePlayer()">✕</button>
  </div>
  <div class="video-container">
    <video id="videoPlayer" playsinline></video>
    <div class="loader" id="loader"><div class="spinner"></div></div>
    <div class="error-msg" id="errorMsg">
      <p>❌ Erro ao carregar o stream</p>
      <button onclick="retryStream()" style="background:#e63946;border:none;padding:8px 16px;border-radius:50px;color:#fff;margin-top:8px;cursor:pointer;">Tentar novamente</button>
    </div>
  </div>
</div>

<div class="cat-scroll" id="catScroll">
  <div class="cat-pill active" data-id="all">📺 Todos</div>
  <div class="cat-pill" data-id="fav">⭐ Favoritos</div>
</div>

<div id="channelsGrid" class="channels-grid"></div>
<div class="toast" id="toast"></div>

<script>
// ========== CONFIGURAÇÃO ==========
const USERNAME = 'f498c3d8e591bfcf632385adb022e6cb';
const PASSWORD = '35fadad7f6af80b732c2';
const PROXY = 'player.php?url=';

let allChannels = [];
let categories = {};
let favorites = JSON.parse(localStorage.getItem('tvFavs') || '[]');
let currentCategory = 'all';
let currentChannel = null;
let hls = null;
let retryCount = 0;

// ========== FUNÇÕES PRINCIPAIS ==========
async function init() {
  showToast('📡 Carregando canais...');
  await loadCategories();
  await loadChannels();
}

async function loadCategories() {
  try {
    const url = `http://bluebox.click/player_api.php?username=${USERNAME}&password=${PASSWORD}&action=get_live_categories`;
    const response = await fetch(PROXY + encodeURIComponent(url));
    const data = await response.json();
    if (Array.isArray(data)) {
      data.forEach(c => { categories[c.category_id] = c.category_name; });
      renderCategories();
    }
  } catch(e) {
    console.log('Categorias:', e);
  }
}

async function loadChannels() {
  try {
    const url = `http://bluebox.click/player_api.php?username=${USERNAME}&password=${PASSWORD}&action=get_live_streams`;
    const response = await fetch(PROXY + encodeURIComponent(url));
    allChannels = await response.json();
    console.log(`✅ ${allChannels.length} canais carregados`);
    showToast(`✅ ${allChannels.length} canais`);
    renderChannels();
    
    // Seleciona primeiro canal automaticamente
    if (allChannels.length > 0 && !currentChannel) {
      setTimeout(() => selectChannel(allChannels[0]), 500);
    }
  } catch(e) {
    console.error('Erro:', e);
    showToast('❌ Erro ao carregar canais');
  }
}

function renderCategories() {
  const container = document.getElementById('catScroll');
  const extra = Object.entries(categories).map(([id, name]) => 
    `<div class="cat-pill" data-id="${id}" onclick="filterByCategory('${id}')">${escapeHtml(name)}</div>`
  ).join('');
  container.innerHTML = `
    <div class="cat-pill active" data-id="all" onclick="filterByCategory('all')">📺 Todos</div>
    <div class="cat-pill" data-id="fav" onclick="filterByCategory('fav')">⭐ Favoritos</div>
    ${extra}
  `;
}

function renderChannels() {
  let list = [...allChannels];
  
  if (currentCategory === 'fav') {
    list = list.filter(c => favorites.includes(String(c.stream_id)));
  } else if (currentCategory !== 'all') {
    list = list.filter(c => String(c.category_id) === currentCategory);
  }
  
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  if (searchTerm) {
    list = list.filter(c => c.name.toLowerCase().includes(searchTerm));
  }
  
  const grid = document.getElementById('channelsGrid');
  
  if (!list.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#888;">📡 Nenhum canal encontrado</div>';
    return;
  }
  
  grid.innerHTML = list.map(ch => {
    const isFav = favorites.includes(String(ch.stream_id));
    const isActive = currentChannel && currentChannel.stream_id == ch.stream_id;
    const logo = ch.stream_icon && ch.stream_icon !== 'flussonic' ? ch.stream_icon : null;
    
    return `
      <div class="channel-card ${isActive ? 'active' : ''}" onclick="selectChannel(${ch.stream_id})">
        <div class="fav-btn" onclick="event.stopPropagation();toggleFavorite(${ch.stream_id})">${isFav ? '★' : '☆'}</div>
        <div class="channel-img">
          ${logo ? `<img src="${logo}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><span style="display:none;">📺</span>` : '<span>📺</span>'}
        </div>
        <div class="ch-name-small">${escapeHtml(ch.name.substring(0, 22))}</div>
      </div>
    `;
  }).join('');
}

// ========== PLAYER ==========
async function selectChannel(streamId) {
  const channel = allChannels.find(c => c.stream_id == streamId);
  if (!channel) return;
  
  currentChannel = channel;
  retryCount = 0;
  
  document.getElementById('currentChannelName').textContent = channel.name;
  document.getElementById('errorMsg').classList.remove('show');
  renderChannels();
  
  // Constrói URL do stream via proxy
  const streamUrl = `http://bluebox.click/live/${USERNAME}/${PASSWORD}/${channel.stream_id}`;
  const proxyUrl = PROXY + encodeURIComponent(streamUrl);
  
  console.log('🎬 Stream:', proxyUrl);
  showToast(`▶️ ${channel.name}`);
  playStream(proxyUrl);
}

function playStream(url) {
  const video = document.getElementById('videoPlayer');
  const loader = document.getElementById('loader');
  const errorDiv = document.getElementById('errorMsg');
  
  loader.classList.add('show');
  errorDiv.classList.remove('show');
  
  if (hls) {
    hls.destroy();
    hls = null;
  }
  
  video.pause();
  video.src = '';
  
  if (Hls.isSupported()) {
    hls = new Hls({
      enableWorker: false,
      lowLatencyMode: true,
      maxBufferLength: 30
    });
    
    hls.loadSource(url);
    hls.attachMedia(video);
    
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(e => console.log('Autoplay:', e));
      loader.classList.remove('show');
      retryCount = 0;
    });
    
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        console.error('HLS Error:', data);
        loader.classList.remove('show');
        
        if (retryCount < 2) {
          retryCount++;
          showToast(`🔄 Tentando novamente (${retryCount}/2)...`);
          setTimeout(() => playStream(url), 2000);
        } else {
          errorDiv.classList.add('show');
        }
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', () => {
      video.play().catch(e => console.log('Autoplay:', e));
      loader.classList.remove('show');
    }, { once: true });
    video.addEventListener('error', () => {
      loader.classList.remove('show');
      errorDiv.classList.add('show');
    }, { once: true });
  } else {
    loader.classList.remove('show');
    errorDiv.classList.add('show');
    showToast('❌ Navegador não suporta HLS');
  }
}

function retryStream() {
  if (!currentChannel) return;
  retryCount = 0;
  const streamUrl = `http://bluebox.click/live/${USERNAME}/${PASSWORD}/${currentChannel.stream_id}`;
  playStream(PROXY + encodeURIComponent(streamUrl));
}

function closePlayer() {
  if (hls) {
    hls.destroy();
    hls = null;
  }
  document.getElementById('videoPlayer').src = '';
  document.getElementById('currentChannelName').textContent = 'Selecione um canal';
  currentChannel = null;
}

// ========== FAVORITOS ==========
function toggleFavorite(streamId) {
  const sid = String(streamId);
  const idx = favorites.indexOf(sid);
  
  if (idx === -1) {
    favorites.push(sid);
    showToast('⭐ Adicionado aos favoritos');
  } else {
    favorites.splice(idx, 1);
    showToast('🗑️ Removido dos favoritos');
  }
  
  localStorage.setItem('tvFavs', JSON.stringify(favorites));
  renderChannels();
}

// ========== FILTROS ==========
function filterByCategory(categoryId) {
  currentCategory = categoryId;
  
  document.querySelectorAll('.cat-pill').forEach(pill => {
    pill.classList.toggle('active', pill.dataset.id === categoryId);
  });
  
  renderChannels();
}

// Busca ao vivo
document.getElementById('searchInput').addEventListener('input', () => renderChannels());

// ========== UTILIDADES ==========
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// Iniciar
init();
</script>
</body>
</html>
